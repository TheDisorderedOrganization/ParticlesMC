[system]
config = "../../1-create-config-right-density/inputframe.xyz"
temperature = 1.4
density = 1.2
list_type = "LinkedList"

[model]
[model."1-1"]
name = "LennardJones"
epsilon = 1.0
sigma = 0.9

[model."1-2"]
name = "LennardJones"
epsilon = 1.0
sigma = 0.95

[model."1-3"]
name = "LennardJones"
epsilon = 1.0
sigma = 1.0

[model."2-2"]
name = "LennardJones"
epsilon = 1.0
sigma = 1.0

[model."2-3"]
name = "LennardJones"
epsilon = 1.0
sigma = 1.05

[model."3-3"]
name = "LennardJones"
epsilon = 1.0
sigma = 1.1

[simulation]
type = "Metropolis"
steps = 500000
seed = 10
parallel = false

[[simulation.move]]
action = "Displacement"
probability = 0.7
policy = "SimpleGaussian"
parameters = {sigma = 0.05}

[[simulation.move]]
action = "DiscreteSwap"
probability = 0.1
policy = "DoubleUniform"
parameters = {species = [1, 2]}

[[simulation.move]]
action = "DiscreteSwap"
probability = 0.1
policy = "DoubleUniform"
parameters = {species = [1, 3]}

[[simulation.move]]
action = "DiscreteSwap"
probability = 0.1
policy = "DoubleUniform"
parameters = {species = [2, 3]}

[[simulation.output]]
algorithm = "StoreCallbacks"
callbacks = ["energy"]
scheduler_params = {linear_interval = 1000}

[[simulation.output]]
algorithm = "StoreAcceptance"
dependencies = ["Metropolis"]
scheduler_params = {linear_interval = 1000}

[[simulation.output]]
algorithm = "StoreLastFrames"
scheduler_params = {linear_interval = 10000}
fmt = "XYZ"

[[simulation.output]]
algorithm = "StoreTrajectories"
scheduler_params = {linear_interval = 1000}
fmt = "XYZ"

[[simulation.output]]
algorithm = "PrintTimeSteps"
scheduler_params = {linear_interval = 1000}
